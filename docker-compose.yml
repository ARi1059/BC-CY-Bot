services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: bccy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bccy}
      POSTGRES_DB: bccy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bccy -d bccy"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    image: bccy-bot:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 容器内连接：覆盖 .env 里给本地开发用的 sqlite/localhost URL
      DATABASE_URL: postgresql+asyncpg://bccy:${POSTGRES_PASSWORD:-bccy}@postgres:5432/bccy
    # 启动时跑迁移再起 Bot；Bot 任何崩溃由 restart: always 兜底
    command: sh -c "alembic upgrade head && python -m bccy_bot"

volumes:
  postgres_data:
    driver: local
