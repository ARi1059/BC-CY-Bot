services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: bccy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bccy}
      POSTGRES_DB: bccy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bccy -d bccy"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://bccy:${POSTGRES_PASSWORD:-bccy}@postgres:5432/bccy
      INITIAL_SUPER_ADMIN_ID: ${INITIAL_SUPER_ADMIN_ID}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
    command: sh -c "alembic upgrade head && python -m bccy_bot"

volumes:
  postgres_data:
